  - type: web
    name: traderadar
    env: python
    plan: free
    region: frankfurt # Optional, choose closest to you
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: postgresql://postgres:Polmarti%231992@db.jidoclecxgvsqrciqwzx.supabase.co:5432/postgres
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Set this in the Render Dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false # Set this in the Render Dashboard
